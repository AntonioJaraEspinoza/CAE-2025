<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>CAE 2026 · HCHM</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#0e1117;--paper:#f5f2eb;--p2:#ede9df;--rule:#c8c2b4;
  --acc:#1a3a2a;--gr:#2d6a4f;--rd:#9b2226;--am:#7b5e00;--mu:#6b6456;--w:#fff;
  --nav:58px;
  --serif:'DM Serif Display',serif;--mono:'DM Mono',monospace;--sans:'DM Sans',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{background:var(--paper);color:var(--ink);font-family:var(--sans);font-size:15px;display:flex;flex-direction:column}

/* HEADER */
.hdr{background:var(--acc);color:var(--w);padding:10px 14px;padding-top:calc(10px + env(safe-area-inset-top,0px));
  display:flex;align-items:center;justify-content:space-between;gap:10px;flex-shrink:0;z-index:50}
.hl{display:flex;align-items:center;gap:9px}
.logo{width:30px;height:30px;background:rgba(255,255,255,.15);border-radius:7px;
  display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.hdr h1{font-family:var(--serif);font-size:16px;font-weight:400;line-height:1.2;color:var(--w)}
.hdr h1 em{font-style:italic;opacity:.65}
.hdr small{font-size:9px;opacity:.4;font-family:var(--mono);display:block;margin-top:1px}
.period-sel{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);
  border-radius:6px;padding:5px 9px;font-family:var(--mono);font-size:11px;
  color:var(--w);-webkit-appearance:none;appearance:none;cursor:pointer}
.period-sel option{background:var(--acc)}

/* SCROLL */
.scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;
  padding:12px 12px calc(var(--nav) + 10px + env(safe-area-inset-bottom,0px))}

/* BOTTOM NAV */
.bnav{position:fixed;bottom:0;left:0;right:0;background:var(--acc);
  border-top:1px solid rgba(255,255,255,.1);display:flex;
  height:calc(var(--nav) + env(safe-area-inset-bottom,0px));
  padding-bottom:env(safe-area-inset-bottom,0px);z-index:100}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
  cursor:pointer;color:rgba(255,255,255,.4);font-size:9px;font-weight:500;padding:5px 2px;transition:color .15s}
.ni svg{width:20px;height:20px;stroke-width:1.8;fill:none;stroke:currentColor}
.ni.on{color:var(--w)}

/* SCREENS */
.sc{display:none}.sc.on{display:block}

/* SECTION LABEL */
.sl{font-family:var(--mono);font-size:9px;letter-spacing:2px;text-transform:uppercase;
  color:var(--mu);margin-bottom:8px;display:flex;align-items:center;gap:8px}
.sl::after{content:'';flex:1;height:1px;background:var(--rule)}

/* KPI GRID */
.kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.kpi{background:var(--w);border:1px solid var(--rule);border-radius:11px;padding:13px;position:relative;overflow:hidden}
.kpi::after{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.kpi.b::after{background:#4a9eff}.kpi.g::after{background:var(--gr)}
.kpi.a::after{background:var(--am)}.kpi.r::after{background:var(--rd)}
.kl{font-size:9px;text-transform:uppercase;letter-spacing:.7px;color:var(--mu);margin-bottom:5px}
.kv{font-size:22px;font-weight:700;font-family:var(--mono);line-height:1;color:var(--ink)}
.ks{font-size:9px;color:var(--mu);margin-top:3px}

/* INDICATORS */
.inds{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px}
.ind{background:var(--w);border:1px solid var(--rule);border-radius:11px;padding:12px 10px;position:relative;overflow:hidden}
.ind .tag{font-family:var(--mono);font-size:8px;letter-spacing:1px;text-transform:uppercase;color:var(--mu);margin-bottom:7px}
.ind .pct{font-family:var(--serif);font-size:26px;line-height:1;letter-spacing:-1px;margin-bottom:2px}
.ind.ok .pct{color:var(--gr)}.ind.lo .pct{color:var(--rd)}.ind.wa .pct,.ind.neu .pct{color:var(--am)}
.ind .frac{font-family:var(--mono);font-size:9px;color:var(--mu);margin-bottom:7px;line-height:1.3}
.ind .ml{font-size:9px;color:var(--mu);display:flex;align-items:center;gap:4px;padding-top:7px;border-top:1px solid var(--p2);line-height:1.3}
.ind .mn{font-size:8px;color:var(--mu);font-style:italic;margin-top:3px;line-height:1.3}
.dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.ok .dot{background:var(--gr)}.lo .dot{background:var(--rd)}.wa .dot,.neu .dot{background:var(--am)}
.gauge{position:absolute;top:10px;right:8px;width:34px;height:34px}
.gauge svg{width:100%;height:100%}
.gbg{fill:none;stroke:var(--p2);stroke-width:3.5}
.gf{fill:none;stroke-width:3.5;stroke-linecap:round;transform:rotate(-90deg);transform-origin:50% 50%}
.ok .gf{stroke:var(--gr)}.lo .gf{stroke:var(--rd)}.wa .gf,.neu .gf{stroke:var(--am)}

/* REM CARDS */
.rems{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px}
.rc{background:var(--p2);border:1px solid var(--rule);border-radius:9px;padding:10px 11px}
.rn{font-family:var(--mono);font-size:8px;letter-spacing:1px;text-transform:uppercase;color:var(--mu);margin-bottom:6px}
.rr{display:flex;justify-content:space-between;font-size:11px;padding:2px 0;border-bottom:1px dashed var(--rule)}
.rr:last-of-type{border:none}.rk{color:var(--mu)}.rv{font-family:var(--mono);font-size:11px;font-weight:500}
.rtot{display:flex;justify-content:space-between;padding:4px 0 0;margin-top:2px;border-top:1px solid var(--rule);font-size:11px;font-weight:600}
.rtot .rv{font-family:var(--mono);color:var(--acc)}

/* FILTER BAR */
.fbar{background:var(--p2);border:1px solid var(--rule);border-radius:9px;
  padding:10px 11px;display:flex;gap:8px;flex-direction:column;margin-bottom:10px}
.fg{display:flex;flex-direction:column;gap:3px}
.fg label{font-size:9px;color:var(--mu);text-transform:uppercase;letter-spacing:.5px;font-weight:500}
select,input[type=text]{background:var(--w);border:1px solid var(--rule);color:var(--ink);
  padding:9px 11px;border-radius:8px;font-size:14px;font-family:var(--sans);
  outline:none;-webkit-appearance:none;appearance:none;width:100%}
select:focus,input:focus{border-color:var(--acc)}
.fr{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.rbtn{padding:8px 14px;background:transparent;border:1px solid var(--rule);border-radius:8px;
  font-size:12px;color:var(--mu);cursor:pointer;font-family:var(--sans);height:40px;white-space:nowrap}
.rbtn:active{background:var(--p2)}
.fcount{font-family:var(--mono);font-size:10px;color:var(--mu)}

/* CARD */
.card{background:var(--w);border:1px solid var(--rule);border-radius:11px;overflow:hidden;margin-bottom:12px}
.card-hd{padding:11px 13px;border-bottom:1px solid var(--rule);display:flex;align-items:center;
  justify-content:space-between;gap:8px;flex-wrap:wrap}
.card-hd h3{font-size:14px;font-weight:600}
.dl-btns{display:flex;gap:6px;flex-wrap:wrap}
.dlb{padding:6px 12px;background:var(--acc);color:var(--w);border:none;border-radius:6px;
  font-size:11px;font-weight:500;cursor:pointer;font-family:var(--sans);white-space:nowrap}
.dlb.sec{background:#4a7c5e}

/* TABLE */
.tw{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse}
thead th{background:var(--acc);color:rgba(255,255,255,.75);padding:8px 11px;text-align:left;
  font-family:var(--mono);font-size:9px;letter-spacing:.8px;text-transform:uppercase;
  white-space:nowrap;font-weight:400;cursor:pointer;user-select:none}
thead th:hover{color:var(--w)}
thead th.r{text-align:right}
tbody tr{border-bottom:1px solid var(--p2)}
tbody tr:last-child{border:none}
tbody tr:active{background:rgba(237,233,223,.7)}
td{padding:8px 11px;vertical-align:middle;white-space:nowrap;font-size:13px}
td.r{text-align:right;font-family:var(--mono);font-size:11px}
.dim{color:var(--mu);font-size:11px}
.mname{font-size:13px;font-weight:600}
.mc{font-size:9px;color:var(--mu);font-family:var(--mono)}

/* SPARK */
.bw{display:flex;align-items:center;justify-content:flex-end;gap:4px}
.bg2{width:36px;height:3px;background:var(--p2);border-radius:2px;overflow:hidden;flex-shrink:0}
.bf{height:100%;border-radius:2px}
.bf.ok{background:var(--gr)}.bf.wa{background:var(--am)}.bf.lo{background:var(--rd)}
.pv{font-family:var(--mono);font-size:10px}
.pv.ok{color:var(--gr)}.pv.wa{color:var(--am)}.pv.lo{color:var(--rd)}

/* PILL */
.pill{display:inline-block;padding:3px 8px;border-radius:4px;font-family:var(--mono);
  font-size:9px;font-weight:500;letter-spacing:.3px;white-space:nowrap}
.pill.ok{background:rgba(45,106,79,.1);color:var(--gr)}
.pill.wa{background:rgba(123,94,0,.1);color:var(--am)}
.pill.lo{background:rgba(155,34,38,.1);color:var(--rd)}

/* PAGINATION */
.pag{display:flex;align-items:center;justify-content:center;gap:5px;
  padding:9px 12px;border-top:1px solid var(--p2);flex-wrap:wrap}
.pbtn{background:var(--p2);border:1px solid var(--rule);color:var(--ink);
  padding:6px 12px;border-radius:6px;cursor:pointer;font-size:13px;min-height:36px;font-family:var(--sans)}
.pbtn.on{background:var(--acc);border-color:var(--acc);color:var(--w);font-weight:700}
.pbtn:disabled{opacity:.3;pointer-events:none}
.pi{font-size:10px;color:var(--mu);font-family:var(--mono);width:100%;text-align:center;margin-bottom:3px}
.empty{text-align:center;padding:24px;color:var(--mu);font-size:13px}

@keyframes fu{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.an{animation:fu .3s ease both}

@media(min-width:600px){
  .kpis{grid-template-columns:repeat(4,1fr)}
  .ind .pct{font-size:32px}
  .fbar{flex-direction:row;flex-wrap:wrap;align-items:flex-end}
  .fg{min-width:160px;flex:1}
}
</style>
</head>
<body>

<!-- HEADER -->
<header class="hdr">
  <div class="hl">
    <div class="logo">🏥</div>
    <div>
      <h1>Producción <em>CAE</em></h1>
      <small>HCHM · REM A07 / A30 / A32</small>
    </div>
  </div>
  <select class="period-sel" id="selPeriod" onchange="onPeriodChange()">
    <option value="Enero">Enero 2026</option>
  </select>
</header>

<!-- SCROLL AREA -->
<div class="scroll" id="scroll">

  <!-- ══ RESUMEN ══ -->
  <div class="sc on" id="sc-res">
    <div class="sl" style="margin-top:4px">Producción total</div>
    <div class="kpis an" id="kpiBlock"></div>

    <div class="sl">Indicadores Minsal</div>
    <div class="inds" id="indsBlock"></div>

    <div class="sl">Desglose REM</div>

  <!-- ══ ESPECIALIDADES ══ -->
  <div class="sc" id="sc-esp">

        </div>

      <div class="fg">
        <label>Servicio</label>
        <select id="eEsp" onchange="filterEsp()"><option value="">Todos</option></select>
      </div>
      <div class="fr" style="justify-content:space-between">
        <button class="rbtn" onclick="resetEsp()">✕ Limpiar</button>
        <span class="fcount" id="espCount"></span>
      </div>
    </div>
    <div class="card an">

      </div>

        <table>
          <thead><tr>
            <th onclick="sE('esp_rem')">Especialidad ↕</th>
            <th class="r" onclick="sE('prod')">Prod. ↕</th>

            <th class="r">Meta</th>
            <th class="r" onclick="sE('pct_nsp')">% NSP ↕</th>
            <th class="r" onclick="sE('pct_altas')">% Altas ↕</th>
            <th class="r">Meta</th>
          </tr></thead>
          <tbody id="tbEsp"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- ══ MÉDICOS ══ -->
  <div class="sc" id="sc-med">
    <div class="fbar" style="margin-top:4px">
      <div class="fg">
        <label>Especialidad REM</label>
        <select id="mEspRem" onchange="onMedRemChange()"><option value="">Todas</option></select>
      </div>
      <div class="fg">
        <label>Servicio</label>
        <select id="mEsp" onchange="filterMed()"><option value="">Todos</option></select>
      </div>
      <div class="fg">
        <label>Buscar médico</label>
        <input type="text" id="sMed" placeholder="Nombre o apellido…" oninput="filterMed()">
      </div>
      <div class="fg">
        <label>Estado CNE</label>
        <select id="fCNE" onchange="filterMed()">
          <option value="">Todos</option>
          <option value="ok">✓ Cumple meta</option>
          <option value="wa">⚠ Cercano</option>
          <option value="lo">✗ Bajo meta</option>
        </select>
      </div>
      <div class="fr" style="justify-content:space-between">
        <button class="rbtn" onclick="resetMed()">✕ Limpiar</button>
        <span class="fcount" id="medCount"></span>
      </div>
    </div>
    <div class="card">
      <div class="card-hd">
        <h3>Por Médico</h3>
        <div class="dl-btns">
          <button class="dlb" onclick="downloadMed()">↓ CSV filtro</button>
          <button class="dlb sec" onclick="downloadFull()">↓ Base completa</button>
        </div>
      </div>
      <div class="tw">
        <table>
          <thead><tr>
            <th onclick="sM('esp_rem')">Esp. REM ↕</th>
            <th onclick="sM('medico')">Médico ↕</th>
            <th class="r" onclick="sM('produccion')">Prod. ↕</th>
            <th class="r" onclick="sM('pct_cne')">% CNE ↕</th>
            <th class="r">Meta</th>
            <th class="r" onclick="sM('pct_nsp')">% NSP ↕</th>
            <th class="r" onclick="sM('pct_altas')">% Altas ↕</th>
            <th class="r">Meta</th>
            <th>Estado</th>
          </tr></thead>
          <tbody id="tbMed"></tbody>
        </table>
      </div>
      <div class="pag" id="pagMed"></div>
    </div>
  </div>

</div><!-- /scroll -->

<!-- BOTTOM NAV -->
<nav class="bnav">
  <div class="ni on" onclick="showSc('res',this)">
    <svg viewBox="0 0 24 24"><rect x="3" y="13" width="4" height="8" rx="1"/><rect x="10" y="8" width="4" height="13" rx="1"/><rect x="17" y="3" width="4" height="18" rx="1"/></svg>
    Resumen
  </div>
  <div class="ni" onclick="showSc('esp',this)">
    <svg viewBox="0 0 24 24"><path d="M9 3H5a2 2 0 00-2 2v4m6-6h10a2 2 0 012 2v4M9 3v18m0 0h10a2 2 0 002-2V9M9 21H5a2 2 0 01-2-2V9m0 0h18"/></svg>
    Especialidad
  </div>
  <div class="ni" onclick="showSc('med',this)">

  </div>
</nav>

// Expand compact to objects
function expand(raw){
  return raw.map(r=>({
    esp_rem:r[0],servicios:r[1],medico:r[2],
    produccion:r[3],cne:r[4],ctrl:r[5],nsp:r[6],citado:r[7],
    altas:r[8],ges:r[9],
    cne_r7:r[10],ctrl_r7:r[11],nsp_r7:r[12],
    cne_r30:r[13],ctrl_r30:r[14],
    cne_r32:r[15],ctrl_r32:r[16],nsp_r32:r[17],
    pct_cne:  r[3]>0?+(r[4]/r[3]*100).toFixed(1):0,
    pct_nsp:  r[7]>0?+(r[6]/r[7]*100).toFixed(1):0,
    pct_altas:r[3]>0?+(r[8]/r[3]*100).toFixed(1):0,
  }));
}

let CUR_PERIOD='Enero';
let MED=expand(RAW[CUR_PERIOD]);

const clC=(p,esp)=>{const m=METAS_CNE[esp]||33;return p>=m?'ok':p>=m*.8?'wa':'lo';};
const clN=(p)=>p<=12?'ok':p<=15?'wa':'lo';
const clA=(p,esp)=>{const m=METAS_ALTAS[esp];if(!m)return'nd';return p>=m?'ok':p>=m*.8?'wa':'lo';};

function calcTot(data){
  const s=k=>data.reduce((a,r)=>a+(r[k]||0),0);
  const prod=s('produccion'),nsp=s('nsp');
  return{prod,nsp,cne:s('cne'),ctrl:s('ctrl'),altas:s('altas'),ges:s('ges'),
    citado:prod+nsp,medicos:new Set(data.map(r=>r.medico)).size,
    esps:new Set(data.map(r=>r.esp_rem)).size,
    r7:s('cne_r7')+s('ctrl_r7'),nsp_r7:s('nsp_r7'),
    cne_r7:s('cne_r7'),ctrl_r7:s('ctrl_r7'),
    r30:s('cne_r30')+s('ctrl_r30'),cne_r30:s('cne_r30'),ctrl_r30:s('ctrl_r30'),
    r32:s('cne_r32')+s('ctrl_r32'),cne_r32:s('cne_r32'),ctrl_r32:s('ctrl_r32'),nsp_r32:s('nsp_r32'),
  };
}

function buildEspSummary(data){
  const m={};
  data.forEach(r=>{
    if(!m[r.esp_rem])m[r.esp_rem]={esp_rem:r.esp_rem,prod:0,cne:0,ctrl:0,nsp:0,altas:0,ges:0,citado:0};
    const e=m[r.esp_rem];
    e.prod+=r.produccion;e.cne+=r.cne;e.ctrl+=r.ctrl;
    e.nsp+=r.nsp;e.altas+=r.altas;e.ges+=r.ges;e.citado+=r.citado;
  });
  return Object.values(m).map(e=>({...e,
    pct_cne:e.prod>0?+(e.cne/e.prod*100).toFixed(1):0,
    pct_nsp:e.citado>0?+(e.nsp/e.citado*100).toFixed(1):0,
    pct_altas:e.prod>0?+(e.altas/e.prod*100).toFixed(1):0,
  }));
}

  const svcs=espEspRem?FMAP[espEspRem]||[]:

function filterEsp(){
  const es=document.getElementById('eEsp').value;

  if(espEspRem) d=d.filter(r=>r.esp_rem===espEspRem);

function getFiltMed(){
  const er=document.getElementById('mEspRem').value;
  const es=document.getElementById('mEsp').value;
  const q=(document.getElementById('sMed')?.value||'').toLowerCase();
  const fc=document.getElementById('fCNE').value;
  return MED.filter(r=>{
    if(er&&r.esp_rem!==er)return false;
    if(es&&!r.servicios.includes(es))return false;
    if(q&&!r.medico.toLowerCase().includes(q))return false;
    if(fc){const m=METAS_CNE[r.esp_rem]||33,p=r.pct_cne;
      if(fc==='ok'&&p<m)return false;if(fc==='wa'&&(p<m*.8||p>=m))return false;if(fc==='lo'&&p>=m*.8)return false;}
    return true;
  }).sort((a,b)=>{const va=a[mSrt.c],vb=b[mSrt.c];return typeof va==='string'?mSrt.d*va.localeCompare(vb):mSrt.d*(va-vb);});
}

      <td><span class="pill ${ov}">${{ok:'✓',wa:'⚠',lo:'✗'}[ov]}</span></td>
    </tr>`;
  }).join('');
  const pag=document.getElementById('pagMed');
  if(pages<=1){pag.innerHTML='';return;}
  let h=`<span class="pi">${(mPg-1)*PP+1}–${Math.min(mPg*PP,data.length)} de ${data.length}</span>`;
  h+=`<button class="pbtn" onclick="gP(${mPg-1})" ${mPg===1?'disabled':''}>‹</button>`;
  const s=Math.max(1,mPg-2),e=Math.min(pages,mPg+2);
  for(let p=s;p<=e;p++)h+=`<button class="pbtn ${p===mPg?'on':''}" onclick="gP(${p})">${p}</button>`;
  h+=`<button class="pbtn" onclick="gP(${mPg+1})" ${mPg===pages?'disabled':''}>›</button>`;
  pag.innerHTML=h;
}
function gP(p){mPg=p;drawMed();document.getElementById('scroll').scrollTop=0;}

// ── DOWNLOADS ─────────────────────────────────────────────────
function toCSV(rows,cols){const esc=v=>{const s=String(v==null?'':v);return s.includes(',')?`"${s}"`:s;};return[cols.join(','),...rows.map(r=>cols.map(c=>esc(r[c])).join(','))].join('\n');}
function dlFile(csv,name){const b=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=name;a.click();}
function downloadEsp(){const cols=['esp_rem','prod','cne','pct_cne','ctrl','nsp','pct_nsp','altas','pct_altas','ges'];dlFile(toCSV([...espFilt].sort((a,b)=>b.prod-a.prod),cols),`esp_cae_${CUR_PERIOD}2026.csv`);}
function downloadMed(){const cols=['esp_rem','servicios','medico','produccion','cne','pct_cne','ctrl','nsp','pct_nsp','citado','altas','pct_altas','ges'];dlFile(toCSV(getFiltMed(),cols),`med_cae_${CUR_PERIOD}2026_filtro.csv`);}
function downloadFull(){const cols=['esp_rem','servicios','medico','produccion','cne','ctrl','nsp','citado','pct_cne','pct_nsp','altas','pct_altas','ges','cne_r7','ctrl_r7','nsp_r7','cne_r30','ctrl_r30','cne_r32','ctrl_r32','nsp_r32'];dlFile(toCSV(MED,cols),`BASE_CAE_${CUR_PERIOD}2026.csv`);}

// ── PERIOD CHANGE ─────────────────────────────────────────────
function onPeriodChange(){
  CUR_PERIOD=document.getElementById('selPeriod').value;
  MED=expand(RAW[CUR_PERIOD]);
  refreshAll();
}
function refreshAll(){
  const espRems=[...new Set(MED.map(r=>r.esp_rem))].sort();
  ['eEspRem','mEspRem'].forEach(id=>{
    const sel=document.getElementById(id);const prev=sel.value;
    sel.innerHTML='<option value="">Todas</option>'+espRems.map(e=>`<option value="${e}"${e===prev?' selected':''}>${e}</option>`).join('');
  });
  espEspRem=''; espFilt=buildEspSummary(MED);
  document.getElementById('espCount').textContent=espFilt.length+' especialidades';
  onMedRemChange();
  drawResumen(MED,'');
  drawEsp();
  drawMed();
}

// ── SCREEN SWITCH ─────────────────────────────────────────────
function showSc(id,el){
  document.querySelectorAll('.sc').forEach(s=>s.classList.remove('on'));
  document.querySelectorAll('.ni').forEach(n=>n.classList.remove('on'));
  document.getElementById('sc-'+id).classList.add('on');
  el.classList.add('on');
  document.getElementById('scroll').scrollTop=0;
}

// ── INIT ──────────────────────────────────────────────────────
(function(){
  const periods=Object.keys(RAW);
  const sel=document.getElementById('selPeriod');
  sel.innerHTML=periods.map(p=>`<option value="${p}">${p} 2026</option>`).join('');
  CUR_PERIOD=periods[0];
  MED=expand(RAW[CUR_PERIOD]);
  refreshAll();
})();
</script>
